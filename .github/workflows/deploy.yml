name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/deploy_key

      - name: Deploy to server
        env:
          DEPLOY_PATH: /var/www/pindar
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
            cd ${DEPLOY_PATH}/frontend && \
            git fetch origin main && \
            git reset --hard origin/main && \
            cd ${DEPLOY_PATH} && \
            docker compose down frontend && \
            docker compose up -d --build frontend && \
            echo 'Waiting for container to start...' && \
            sleep 10 && \
            docker compose logs frontend --tail 50
          "

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -H "Content-Type: application/json" -X POST -d "{\"content\":\"✅ Frontend deployment successful! Visit: https://pindar.id\"}" $DISCORD_WEBHOOK
          else
            curl -H "Content-Type: application/json" -X POST -d "{\"content\":\"❌ Frontend deployment failed!\"}" $DISCORD_WEBHOOK
          fi

name: Deploy Frontend - ${{ github.event.head_commit.message }}

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: /var/www/pindar/frontend
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "\
            cd ${DEPLOY_PATH} && \
            sudo git pull origin main && \
            cd .. && \
            sudo docker compose up -d --build frontend && \
            sudo docker compose logs frontend"

      - name: Send Discord Notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -H "Content-Type: application/json" -X POST -d "{\"content\":\"✅ Frontend deployment successful! Commit: ${{ github.event.head_commit.message }}\"}" $DISCORD_WEBHOOK
          else
            curl -H "Content-Type: application/json" -X POST -d "{\"content\":\"❌ Frontend deployment failed! Commit: ${{ github.event.head_commit.message }}\"}" $DISCORD_WEBHOOK
          fi
